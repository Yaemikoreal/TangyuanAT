name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (leave empty for latest)'
        required: false
        type: string

  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.DEPLOY_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run pre-deployment tests
        run: |
          pytest tests/ -v --tb=short
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi
      
      - name: Pull image
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} || \
          docker pull ghcr.io/${{ github.repository }}:latest
      
      - name: Deploy announcement
        run: |
          echo "🚀 Deploying TangyuanAT ${{ steps.version.outputs.version }} to ${{ github.event.inputs.environment || 'production' }}"
          echo "- Version: ${{ steps.version.outputs.version }}"
          echo "- Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "- Commit: ${{ github.sha }}"
          echo "- Actor: ${{ github.actor }}"
      
      # 实际部署步骤 - 根据您的部署目标配置
      # 示例: SSH 部署
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_KEY }}
      #     script: |
      #       cd /opt/tangyuanat
      #       docker-compose pull
      #       docker-compose up -d
      #       docker system prune -f
      
      # 示例: Kubernetes 部署
      # - name: Deploy to Kubernetes
      #   uses: azure/k8s-deploy@v4
      #   with:
      #     manifests: |
      #       k8s/deployment.yaml
      #       k8s/service.yaml
      #     images: |
      #       ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
      #     namespace: tangyuanat
      
      - name: Send deployment notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            EMOJI="✅"
            MSG="部署成功"
          else
            EMOJI="❌"
            MSG="部署失败"
          fi
          
          # 如果配置了飞书 webhook，发送通知
          if [ -n "${{ secrets.FEISHU_DEPLOY_WEBHOOK }}" ]; then
            curl -X POST "${{ secrets.FEISHU_DEPLOY_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d '{
                "msg_type": "interactive",
                "card": {
                  "header": {
                    "title": {"tag": "plain_text", "content": "'"$EMOJI"' TangyuanAT '"$MSG"'"},
                    "template": "'"$STATUS"'"
                  },
                  "elements": [
                    {
                      "tag": "div",
                      "fields": [
                        {"is_short": true, "text": {"tag": "lark_md", "content": "**版本:** ${{ steps.version.outputs.version }}"}},
                        {"is_short": true, "text": {"tag": "lark_md", "content": "**环境:** ${{ github.event.inputs.environment || '"production"' }}"}},
                        {"is_short": true, "text": {"tag": "lark_md", "content": "**提交:** ${{ github.sha }}"}},
                        {"is_short": true, "text": {"tag": "lark_md", "content": "**执行人:** ${{ github.actor }}"}}
                      ]
                    }
                  ]
                }
              }'
          fi

  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy]
    
    steps:
      - name: Rollback notification
        run: |
          echo "⚠️ Deployment failed, rollback may be required"
          echo "Please manually rollback to the previous version"
      
      - name: Create issue for failed deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Deployment failed - ' + context.runId,
              body: `
                ## Deployment Failure
                
                - **Environment:** ${{ github.event.inputs.environment || 'production' }}
                - **Version:** ${{ steps.version.outputs.version }}
                - **Commit:** ${{ github.sha }}
                - **Actor:** ${{ github.actor }}
                - **Run:** ${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
                
                Please investigate and fix the issue.
              `,
              labels: ['deployment', 'bug']
            })