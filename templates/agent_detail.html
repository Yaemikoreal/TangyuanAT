<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 详情 - TangyuanAT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .agent-header {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .agent-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .agent-info h2 { font-size: 28px; margin-bottom: 8px; }
        .agent-info p { color: #666; margin-bottom: 12px; }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-online { background: #d4edda; color: #155724; }
        .status-offline { background: #f8d7da; color: #721c24; }
        .status-busy { background: #fff3cd; color: #856404; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .card h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-tag {
            padding: 6px 12px;
            background: linear-gradient(135deg, #667eea22 0%, #764ba222 100%);
            border-radius: 16px;
            font-size: 13px;
            color: #667eea;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: #666; }
        .stat-value { font-weight: 600; }
        .config-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label { font-size: 14px; color: #666; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .log-list { max-height: 300px; overflow-y: auto; }
        .log-item { 
            padding: 12px; 
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .log-item:hover { background: #f8f9fa; }
        .log-time { font-size: 12px; color: #999; }
        .log-action { font-size: 14px; margin-top: 4px; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 40px; color: #666; }
        
        /* 进度条 */
        .progress-section {
            margin-top: 16px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        /* 任务列表 */
        .task-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .task-item:last-child { border-bottom: none; }
        .task-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .task-status.completed { background: #28a745; }
        .task-status.pending { background: #ffc107; }
        .task-status.failed { background: #dc3545; }
        .task-name { flex: 1; font-size: 14px; }
        
        /* 保存成功提示 */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Agent 详情</h1>
        <a href="/" class="back-btn">← 返回仪表盘</a>
    </div>
    <div class="container">
        <div class="agent-header">
            <div class="agent-avatar" id="avatar">🌀</div>
            <div class="agent-info">
                <h2 id="name">加载中...</h2>
                <p id="role">加载中...</p>
                <span class="status-badge status-offline" id="status">离线</span>
            </div>
        </div>
        <div class="grid">
            <div class="card">
                <h3>🎯 技能列表</h3>
                <div class="skill-list" id="skills">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            <div class="card">
                <h3>📊 性能统计</h3>
                <div class="stat-row">
                    <span class="stat-label">完成任务数</span>
                    <span class="stat-value" id="tasks">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">处理消息数</span>
                    <span class="stat-value" id="messages">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">最后活跃</span>
                    <span class="stat-value" id="lastActive">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">当前模型</span>
                    <span class="stat-value" id="model">-</span>
                </div>
                <div class="progress-section">
                    <div class="progress-label">
                        <span>任务完成率</span>
                        <span id="completion-rate">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3>⚙️ 配置管理</h3>
                <form class="config-form" id="configForm">
                    <div class="form-group">
                        <label>模型选择</label>
                        <select id="modelSelect">
                            <option value="kimi-k2.5">Kimi K2.5</option>
                            <option value="glm-5">GLM-5</option>
                            <option value="gpt-4">GPT-4</option>
                            <option value="claude-3">Claude 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>角色描述</label>
                        <textarea id="characterInput" rows="3" placeholder="输入角色描述..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary">保存配置</button>
                </form>
            </div>
            <div class="card">
                <h3>📋 最近工作日志</h3>
                <div class="log-list" id="logs">
                    <div class="empty-state">暂无日志</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast">保存成功!</div>
    
    <script>
        const agentId = new URLSearchParams(window.location.search).get('id') || 'xilian';
        
        // 加载 Agent 数据
        async function loadAgent() {
            try {
                const res = await fetch(`/api/agents/${agentId}`);
                const data = await res.json();
                
                if (data.success) {
                    const agent = data.data;
                    
                    // 更新基本信息
                    document.getElementById('name').textContent = agent.name;
                    document.getElementById('role').textContent = agent.role;
                    document.getElementById('avatar').textContent = agent.emoji || '🌀';
                    
                    // 更新状态
                    const statusEl = document.getElementById('status');
                    statusEl.textContent = agent.status === 'online' ? '在线' : agent.status === 'busy' ? '忙碌' : '离线';
                    statusEl.className = `status-badge status-${agent.status}`;
                    
                    // 更新统计
                    document.getElementById('tasks').textContent = agent.tasks_completed || 0;
                    document.getElementById('messages').textContent = agent.messages_processed || 0;
                    document.getElementById('lastActive').textContent = agent.last_active 
                        ? new Date(agent.last_active).toLocaleString('zh-CN') 
                        : '-';
                    document.getElementById('model').textContent = agent.model || '-';
                    
                    // 更新进度
                    const rate = agent.tasks_completed > 0 
                        ? Math.min(100, Math.round((agent.tasks_completed / 50) * 100)) 
                        : 0;
                    document.getElementById('completion-rate').textContent = rate + '%';
                    document.getElementById('progress-fill').style.width = rate + '%';
                    
                    // 更新技能列表
                    const skillsEl = document.getElementById('skills');
                    if (agent.skills && agent.skills.length > 0) {
                        skillsEl.innerHTML = agent.skills
                            .map(skill => `<span class="skill-tag">${skill}</span>`)
                            .join('');
                    } else {
                        skillsEl.innerHTML = '<div class="empty-state">暂无技能</div>';
                    }
                    
                    // 更新配置表单
                    document.getElementById('modelSelect').value = agent.model || 'kimi-k2.5';
                    document.getElementById('characterInput').value = agent.character || '';
                }
            } catch (error) {
                console.error('Failed to load agent:', error);
            }
        }
        
        // 加载日志
        async function loadLogs() {
            try {
                const res = await fetch(`/api/logs?agent_id=${agentId}&per_page=20`);
                const data = await res.json();
                
                if (data.success && data.data.length > 0) {
                    const logsEl = document.getElementById('logs');
                    logsEl.innerHTML = data.data.map(log => `
                        <div class="log-item">
                            <div class="log-time">${new Date(log.timestamp).toLocaleString('zh-CN')}</div>
                            <div class="log-action">${log.action}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Failed to load logs:', error);
            }
        }
        
        // 保存配置
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const model = document.getElementById('modelSelect').value;
            const character = document.getElementById('characterInput').value;
            
            try {
                const res = await fetch(`/api/agents/${agentId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model, character })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showToast('保存成功!');
                } else {
                    showToast('保存失败: ' + data.error);
                }
            } catch (error) {
                showToast('保存失败');
            }
        });
        
        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAgent();
            loadLogs();
        });
    </script>
</body>
</html>
