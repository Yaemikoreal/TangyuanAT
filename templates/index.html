<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TangyuanAT - Agent Team 监控平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header p {
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        /* Agents 状态 */
        .agents-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        
        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .agent-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .agent-info h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .agent-info span {
            font-size: 14px;
            color: #666;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: auto;
        }
        
        .status-online {
            background: #d4edda;
            color: #155724;
        }
        
        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .agent-details {
            display: grid;
            gap: 12px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: #666;
            font-size: 14px;
        }
        
        .detail-value {
            font-weight: 500;
            font-size: 14px;
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        
        .skill-tag {
            background: linear-gradient(135deg, #667eea22 0%, #764ba222 100%);
            color: #667eea;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        /* 日志区域 */
        .logs-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h2 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        
        .refresh-btn:hover {
            opacity: 0.9;
        }
        
        .log-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            transition: background 0.3s;
        }
        
        .log-item:hover {
            background: #e9ecef;
        }
        
        .log-time {
            font-size: 12px;
            color: #666;
            min-width: 80px;
        }
        
        .log-agent {
            font-weight: 600;
            min-width: 60px;
        }
        
        .log-action {
            flex: 1;
            color: #333;
        }
        
        /* 连接状态 */
        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 12px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .connection-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }
        
        .connection-indicator.disconnected {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🚀 TangyuanAT</h1>
        <p>Agent Team 实时监控平台 | 昔涟 & 汤圆</p>
    </header>
    
    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>在线 Agents</h3>
                <div class="stat-value" id="online-agents">2</div>
            </div>
            <div class="stat-card">
                <h3>总任务数</h3>
                <div class="stat-value" id="total-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>消息处理</h3>
                <div class="stat-value" id="total-messages">0</div>
            </div>
            <div class="stat-card">
                <h3>运行时间</h3>
                <div class="stat-value" id="uptime">--</div>
            </div>
        </div>
        
        <!-- Agents 状态 -->
        <div class="agents-section" id="agents-container">
            <!-- 动态加载 -->
        </div>
        
        <!-- 工作日志 -->
        <div class="logs-section">
            <div class="section-header">
                <h2>📋 工作日志</h2>
                <button class="refresh-btn" onclick="loadLogs()">刷新</button>
            </div>
            <div class="log-list" id="log-list">
                <!-- 动态加载 -->
            </div>
        </div>
    </div>
    
    <!-- 连接状态 -->
    <div class="connection-status">
        <div class="connection-indicator" id="conn-indicator"></div>
        <span id="conn-text">实时连接中</span>
    </div>
    
    <script>
        // 加载 Agents 数据
        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                const result = await response.json();
                
                if (result.success) {
                    renderAgents(result.data);
                }
            } catch (error) {
                console.error('Failed to load agents:', error);
            }
        }
        
        // 渲染 Agents
        function renderAgents(agents) {
            const container = document.getElementById('agents-container');
            container.innerHTML = '';
            
            Object.entries(agents).forEach(([id, agent]) => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-avatar">${agent.emoji}</div>
                        <div class="agent-info">
                            <h2>${agent.name} <span>(${agent.english_name})</span></h2>
                            <span>${agent.role}</span>
                        </div>
                        <div class="status-badge status-${agent.status}">
                            ${agent.status === 'online' ? '在线' : '离线'}
                        </div>
                    </div>
                    <div class="agent-details">
                        <div class="detail-row">
                            <span class="detail-label">模型</span>
                            <span class="detail-value">${agent.model}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">性格</span>
                            <span class="detail-value">${agent.character}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">完成任务</span>
                            <span class="detail-value">${agent.tasks_completed}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">处理消息</span>
                            <span class="detail-value">${agent.messages_processed}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">最后活跃</span>
                            <span class="detail-value">${formatTime(agent.last_active)}</span>
                        </div>
                    </div>
                    <div class="skills-list">
                        ${agent.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('total-tasks').textContent = result.data.total_tasks;
                    document.getElementById('total-messages').textContent = result.data.total_messages;
                    document.getElementById('online-agents').textContent = result.data.agents_online;
                    document.getElementById('uptime').textContent = result.data.uptime;
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }
        
        // 加载日志
        async function loadLogs() {
            try {
                const response = await fetch('/api/logs');
                const result = await response.json();
                
                if (result.success) {
                    renderLogs(result.data);
                }
            } catch (error) {
                console.error('Failed to load logs:', error);
            }
        }
        
        // 渲染日志
        function renderLogs(logs) {
            const container = document.getElementById('log-list');
            container.innerHTML = '';
            
            logs.reverse().forEach(log => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `
                    <span class="log-time">${formatTime(log.timestamp)}</span>
                    <span class="log-agent" style="color: ${log.agent_id === 'xilian' ? '#667eea' : '#764ba2'}">${log.agent_name}</span>
                    <span class="log-action">${log.action}</span>
                `;
                container.appendChild(item);
            });
        }
        
        // 格式化时间
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        
        // SSE 实时连接
        function connectSSE() {
            const eventSource = new EventSource('/api/stream');
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'heartbeat') {
                    renderAgents(data.agents);
                }
            };
            
            eventSource.onerror = () => {
                document.getElementById('conn-indicator').classList.add('disconnected');
                document.getElementById('conn-text').textContent = '连接断开';
            };
            
            eventSource.onopen = () => {
                document.getElementById('conn-indicator').classList.remove('disconnected');
                document.getElementById('conn-text').textContent = '实时连接中';
            };
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
            loadStats();
            loadLogs();
            connectSSE();
            
            // 定时刷新
            setInterval(loadStats, 5000);
            setInterval(loadLogs, 10000);
        });
    </script>
</body>
</html>
