<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TangyuanAT - Agent Team 监控平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header p {
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }
        
        .header-nav {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: rgba(102, 126, 234, 0.2);
        }
        
        .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        /* Agents 状态 */
        .agents-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }
        
        .agent-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        
        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .agent-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .agent-info h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .agent-info span {
            font-size: 14px;
            color: #666;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: auto;
        }
        
        .status-online {
            background: #d4edda;
            color: #155724;
        }
        
        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .agent-details {
            display: grid;
            gap: 12px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: #666;
            font-size: 14px;
        }
        
        .detail-value {
            font-weight: 500;
            font-size: 14px;
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        
        .skill-tag {
            background: linear-gradient(135deg, #667eea22 0%, #764ba222 100%);
            color: #667eea;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        /* 日志区域 */
        .logs-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h2 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        
        .refresh-btn:hover {
            opacity: 0.9;
        }
        
        .log-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            transition: background 0.3s;
        }
        
        .log-item:hover {
            background: #e9ecef;
        }
        
        .log-time {
            font-size: 12px;
            color: #666;
            min-width: 80px;
        }
        
        .log-agent {
            font-weight: 600;
            min-width: 60px;
        }
        
        .log-action {
            flex: 1;
            color: #333;
        }
        
        /* 连接状态 */
        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 12px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .connection-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }
        
        .connection-indicator.disconnected {
            background: #dc3545;
        }
        
        /* 监控面板样式 */
        .monitoring-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        
        .monitoring-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .monitor-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }
        
        .monitor-card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #333;
        }
        
        .monitor-card.status-ok {
            border-left-color: #28a745;
        }
        
        .monitor-card.status-error {
            border-left-color: #dc3545;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .status-row:last-child {
            border-bottom: none;
        }
        
        .status-row .label {
            color: #666;
            font-size: 14px;
        }
        
        .status-row .value {
            font-weight: 500;
            font-size: 14px;
        }
        
        .status-row .value.status-ok {
            color: #28a745;
        }
        
        .status-row .value.status-error {
            color: #dc3545;
        }
        
        .resource-section {
            margin-bottom: 16px;
        }
        
        .resource-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .resource-icon {
            font-size: 16px;
        }
        
        .resource-name {
            flex: 1;
            font-weight: 500;
        }
        
        .resource-value {
            font-weight: 600;
        }
        
        .resource-value.low {
            color: #28a745;
        }
        
        .resource-value.medium {
            color: #ffc107;
        }
        
        .resource-value.high {
            color: #dc3545;
        }
        
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .progress-fill.low {
            background: linear-gradient(90deg, #28a745, #20c997);
        }
        
        .progress-fill.medium {
            background: linear-gradient(90deg, #ffc107, #fd7e14);
        }
        
        .progress-fill.high {
            background: linear-gradient(90deg, #dc3545, #c82333);
        }
        
        .resource-detail {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .health-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .health-score {
            margin-bottom: 16px;
        }
        
        .score-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .score-inner {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .score-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .score-label {
            font-size: 12px;
            color: #666;
        }
        
        .health-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-emoji {
            font-size: 24px;
        }
        
        .status-text {
            font-weight: 600;
            font-size: 16px;
        }
        
        .chart-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .chart-section h4 {
            margin-bottom: 16px;
            color: #333;
        }
        
        .chart-container {
            width: 100%;
        }
        
        .chart-container canvas {
            width: 100%;
            max-height: 200px;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        
        .truncate {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* 对话历史样式 */
        .chat-history-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        
        .chat-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .chat-messages {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .chat-message {
            display: flex;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        
        .chat-message:hover {
            background: #f8f9fa;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .message-content {
            flex: 1;
            min-width: 0;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        
        .message-sender {
            font-weight: 600;
            font-size: 14px;
        }
        
        .message-time {
            font-size: 12px;
            color: #999;
        }
        
        .message-text {
            font-size: 14px;
            color: #333;
            word-break: break-word;
        }
        
        .load-more-container {
            text-align: center;
            padding: 20px;
        }
        
        .load-more-btn {
            padding: 10px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .new-message-indicator {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        
        /* 图表样式 */
        .charts-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }
        
        .chart-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
        }
        
        .chart-card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #333;
        }
        
        .chart-wrapper {
            height: 300px;
            position: relative;
        }
        
        .time-range-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .time-range-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        .time-range-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .export-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .export-btn {
            padding: 10px 20px;
            border: 1px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .pagination-info {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .loading-indicator {
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #666;
        }
        
        .error-state {
            text-align: center;
            padding: 40px;
            color: #dc3545;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🚀 TangyuanAT</h1>
        <p>Agent Team 实时监控平台 | 昔涟 & 汤圆</p>
        <nav class="header-nav">
            <button class="nav-btn active" data-tab="dashboard">仪表盘</button>
            <button class="nav-btn" data-tab="chat-history">💬 对话历史</button>
            <button class="nav-btn" data-tab="charts">📊 统计图表</button>
        </nav>
    </header>
    
    <div class="container">
        <!-- 仪表盘标签页 -->
        <div id="tab-dashboard" class="tab-content active">
            <!-- 统计卡片 -->
            <div class="stats-grid">
            <div class="stat-card">
                <h3>在线 Agents</h3>
                <div class="stat-value" id="online-agents">2</div>
            </div>
            <div class="stat-card">
                <h3>总任务数</h3>
                <div class="stat-value" id="total-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>消息处理</h3>
                <div class="stat-value" id="total-messages">0</div>
            </div>
            <div class="stat-card">
                <h3>运行时间</h3>
                <div class="stat-value" id="uptime">--</div>
            </div>
        </div>
        
        <!-- 系统监控面板 -->
        <div class="monitoring-section">
            <div class="section-header">
                <h2>🔍 系统监控</h2>
            </div>
            <div class="monitoring-grid">
                <!-- 健康状态概览 -->
                <div class="monitor-card health-card" id="health-overview">
                    <div class="loading">加载中...</div>
                </div>
                
                <!-- 数据库状态 -->
                <div id="database-status">
                    <div class="loading">加载中...</div>
                </div>
                
                <!-- 网关状态 -->
                <div id="gateway-status">
                    <div class="loading">加载中...</div>
                </div>
                
                <!-- 系统资源 -->
                <div id="system-resources">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            
            <!-- 资源图表 -->
            <div class="chart-section" id="resource-charts">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- Agents 状态 -->
        <div class="agents-section" id="agents-container">
            <!-- 动态加载 -->
        </div>
        
        <!-- 工作日志 -->
        <div class="logs-section">
            <div class="section-header">
                <h2>📋 工作日志</h2>
                <button class="refresh-btn" onclick="loadLogs()">刷新</button>
            </div>
            <div class="log-list" id="log-list">
                <!-- 动态加载 -->
            </div>
        </div>
        </div><!-- /tab-dashboard -->
        
        <!-- 对话历史标签页 -->
        <div id="tab-chat-history" class="tab-content">
            <div class="chat-history-section">
                <div class="section-header">
                    <h2>💬 对话历史</h2>
                </div>
                <div class="chat-filters">
                    <button class="filter-btn active" data-agent="all" onclick="ChatHistory.setFilter('all')">全部</button>
                    <button class="filter-btn" data-agent="xilian" onclick="ChatHistory.setFilter('xilian')">🌀 昔涟</button>
                    <button class="filter-btn" data-agent="tangyuan" onclick="ChatHistory.setFilter('tangyuan')">🐱 汤圆</button>
                    <button class="filter-btn" data-agent="doufu" onclick="ChatHistory.setFilter('doufu')">🐩 豆腐</button>
                </div>
                <div class="pagination-info" id="pagination-info">加载中...</div>
                <div id="chat-loading" class="loading-indicator" style="display:none;">加载中...</div>
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-state">暂无对话记录</div>
                </div>
                <div class="load-more-container">
                    <button class="load-more-btn" id="load-more-btn" onclick="ChatHistory.loadMore()">加载更多</button>
                </div>
            </div>
        </div><!-- /tab-chat-history -->
        
        <!-- 统计图表标签页 -->
        <div id="tab-charts" class="tab-content">
            <div class="charts-section">
                <div class="section-header">
                    <h2>📊 统计图表</h2>
                    <button class="refresh-btn" onclick="Charts.refresh()">刷新</button>
                </div>
                <div class="time-range-selector">
                    <button class="time-range-btn active" data-range="24h" onclick="Charts.setTimeRange('24h')">24小时</button>
                    <button class="time-range-btn" data-range="7d" onclick="Charts.setTimeRange('7d')">7天</button>
                    <button class="time-range-btn" data-range="30d" onclick="Charts.setTimeRange('30d')">30天</button>
                </div>
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>响应时间趋势</h3>
                        <div class="chart-wrapper">
                            <canvas id="response-time-chart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <h3>任务完成率对比</h3>
                        <div class="chart-wrapper">
                            <canvas id="task-completion-chart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="export-section">
                    <button class="export-btn" onclick="Charts.exportReport('csv')">📥 导出 CSV</button>
                    <button class="export-btn" onclick="Charts.exportReport('json')">📥 导出 JSON</button>
                </div>
            </div>
        </div><!-- /tab-charts -->
    </div><!-- /container -->
    
    <!-- 连接状态 -->
    <div class="connection-status">
        <div class="connection-indicator" id="conn-indicator"></div>
        <span id="conn-text">实时连接中</span>
    </div>
    
    <!-- 监控面板脚本 -->
    <script src="/static/js/monitoring.js"></script>
    <script src="/static/js/chat_history.js"></script>
    <script src="/static/js/charts.js"></script>
    
    <script>
        // 标签页切换
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                
                // 更新按钮状态
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // 切换标签页
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.getElementById('tab-' + tabId).classList.add('active');
                
                // 按需加载数据
                if (tabId === 'chat-history') {
                    ChatHistory.load();
                    ChatHistory.connectSSE();
                } else if (tabId === 'charts') {
                    Charts.refresh();
                }
            });
        });
    
    <script>
        // 加载 Agents 数据
        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                const result = await response.json();
                
                if (result.success) {
                    renderAgents(result.data);
                }
            } catch (error) {
                console.error('Failed to load agents:', error);
            }
        }
        
        // 渲染 Agents
        function renderAgents(agents) {
            const container = document.getElementById('agents-container');
            container.innerHTML = '';
            
            Object.entries(agents).forEach(([id, agent]) => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.style.cursor = 'pointer';
                card.onclick = () => window.location.href = `/agent_detail?id=${id}`;
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-avatar">${agent.emoji}</div>
                        <div class="agent-info">
                            <h2>${agent.name} <span>(${agent.english_name})</span></h2>
                            <span>${agent.role}</span>
                        </div>
                        <div class="status-badge status-${agent.status}">
                            ${agent.status === 'online' ? '在线' : '离线'}
                        </div>
                    </div>
                    <div class="agent-details">
                        <div class="detail-row">
                            <span class="detail-label">模型</span>
                            <span class="detail-value">${agent.model}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">性格</span>
                            <span class="detail-value">${agent.character}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">完成任务</span>
                            <span class="detail-value">${agent.tasks_completed}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">处理消息</span>
                            <span class="detail-value">${agent.messages_processed}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">最后活跃</span>
                            <span class="detail-value">${formatTime(agent.last_active)}</span>
                        </div>
                    </div>
                    <div class="skills-list">
                        ${agent.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('total-tasks').textContent = result.data.total_tasks;
                    document.getElementById('total-messages').textContent = result.data.total_messages;
                    document.getElementById('online-agents').textContent = result.data.agents_online;
                    document.getElementById('uptime').textContent = result.data.uptime;
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }
        
        // 加载日志
        async function loadLogs() {
            try {
                const response = await fetch('/api/logs');
                const result = await response.json();
                
                if (result.success) {
                    renderLogs(result.data);
                }
            } catch (error) {
                console.error('Failed to load logs:', error);
            }
        }
        
        // 渲染日志
        function renderLogs(logs) {
            const container = document.getElementById('log-list');
            container.innerHTML = '';
            
            logs.reverse().forEach(log => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `
                    <span class="log-time">${formatTime(log.timestamp)}</span>
                    <span class="log-agent" style="color: ${log.agent_id === 'xilian' ? '#667eea' : '#764ba2'}">${log.agent_name}</span>
                    <span class="log-action">${log.action}</span>
                `;
                container.appendChild(item);
            });
        }
        
        // 格式化时间
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        
        // SSE 实时连接
        function connectSSE() {
            const eventSource = new EventSource('/api/stream');
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'heartbeat') {
                    renderAgents(data.agents);
                }
            };
            
            eventSource.onerror = () => {
                document.getElementById('conn-indicator').classList.add('disconnected');
                document.getElementById('conn-text').textContent = '连接断开';
            };
            
            eventSource.onopen = () => {
                document.getElementById('conn-indicator').classList.remove('disconnected');
                document.getElementById('conn-text').textContent = '实时连接中';
            };
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
            loadStats();
            loadLogs();
            connectSSE();
            
            // 定时刷新
            setInterval(loadStats, 5000);
            setInterval(loadLogs, 10000);
        });
    </script>
</body>
</html>
