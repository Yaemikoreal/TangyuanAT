<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TangyuanAT - Agent Team 监控平台</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <!-- 导航栏 -->
    <header class="header glass-navbar">
        <div class="header-top">
            <div>
                <h1>TangyuanAT</h1>
                <p class="header-subtitle">Agent Team 实时监控平台</p>
            </div>
            <div id="gateway-status-indicator">
                <!-- 动态加载 -->
            </div>
        </div>
        <nav class="header-nav">
            <button class="nav-btn active" data-tab="dashboard">仪表盘</button>
            <button class="nav-btn" data-tab="chat-history">对话历史</button>
            <button class="nav-btn" data-tab="charts">统计图表</button>
            <button class="nav-btn" data-tab="monitoring">系统监控</button>
        </nav>
    </header>
    
    <div class="container">
        <!-- 仪表盘标签页 -->
        <div id="tab-dashboard" class="tab-content active">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <span class="stat-label">在线 Agents</span>
                    <span class="stat-value" id="online-agents">-</span>
                    <span class="stat-trend trend-up" id="agents-trend"></span>
                </div>
                <div class="stat-card glass-card">
                    <span class="stat-label">今日任务</span>
                    <span class="stat-value" id="today-tasks">-</span>
                </div>
                <div class="stat-card glass-card">
                    <span class="stat-label">今日消息</span>
                    <span class="stat-value" id="today-messages">-</span>
                </div>
                <div class="stat-card glass-card">
                    <span class="stat-label">系统状态</span>
                    <span class="stat-value" id="system-status">-</span>
                </div>
            </div>
            
            <!-- Agents 状态 -->
            <h2 style="margin-bottom: 16px; font-size: 18px; color: var(--text-secondary);">Agents 状态</h2>
            <div class="agents-section" id="agents-container">
                <div class="loading">加载中...</div>
            </div>
            
            <!-- 工作日志 -->
            <div class="logs-section glass-card">
                <div class="section-header">
                    <h2>工作日志</h2>
                    <button class="refresh-btn" onclick="loadLogs()">刷新</button>
                </div>
                <div class="log-list" id="log-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
        
        <!-- 对话历史标签页 -->
        <div id="tab-chat-history" class="tab-content">
            <div class="chat-history-section glass-card">
                <div class="section-header">
                    <h2>对话历史</h2>
                </div>
                <div class="chat-filters">
                    <button class="filter-btn active" data-agent="all" onclick="ChatHistory.setFilter('all')">全部</button>
                    <button class="filter-btn" data-agent="xilian" onclick="ChatHistory.setFilter('xilian')">昔涟</button>
                    <button class="filter-btn" data-agent="tangyuan" onclick="ChatHistory.setFilter('tangyuan')">汤圆</button>
                    <button class="filter-btn" data-agent="doufu" onclick="ChatHistory.setFilter('doufu')">豆腐</button>
                </div>
                <div class="pagination-info" id="pagination-info"></div>
                <div id="chat-loading" class="loading-indicator" style="display:none;">加载中...</div>
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-state">暂无对话记录</div>
                </div>
                <div class="load-more-container" style="text-align: center; padding: 16px;">
                    <button class="refresh-btn" id="load-more-btn" onclick="ChatHistory.loadMore()">加载更多</button>
                </div>
            </div>
        </div>
        
        <!-- 统计图表标签页 -->
        <div id="tab-charts" class="tab-content">
            <div class="charts-section glass-card">
                <div class="section-header">
                    <h2>统计图表</h2>
                    <button class="refresh-btn" onclick="Charts.refresh()">刷新</button>
                </div>
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>响应时间趋势</h3>
                        <div class="chart-wrapper">
                            <canvas id="response-time-chart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <h3>任务完成统计</h3>
                        <div class="chart-wrapper">
                            <canvas id="task-completion-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 系统监控标签页 -->
        <div id="tab-monitoring" class="tab-content">
            <div class="monitoring-section glass-card">
                <div class="section-header">
                    <h2>系统监控</h2>
                    <button class="refresh-btn" onclick="loadMonitoring()">刷新</button>
                </div>
                <div class="monitoring-grid" id="monitoring-grid">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 连接状态 -->
    <div class="connection-status">
        <div class="connection-indicator" id="conn-indicator"></div>
        <span id="conn-text">连接中...</span>
    </div>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        // ========== 全局状态 ==========
        const state = {
            agents: {},
            stats: {},
            logs: [],
            sse: null,
            charts: {}
        };
        
        // ========== 工具函数 ==========
        function formatTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }
        
        function formatRelativeTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return '刚刚';
            if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} 小时前`;
            return `${Math.floor(diff / 86400)} 天前`;
        }
        
        function getStatusText(status) {
            const statusMap = {
                'online': '在线',
                'offline': '离线',
                'busy': '任务中',
                'idle': '闲置'
            };
            return statusMap[status] || '未知';
        }
        
        function getStatusClass(status) {
            const classMap = {
                'online': 'status-online',
                'offline': 'status-offline',
                'busy': 'status-busy',
                'idle': 'status-idle'
            };
            return classMap[status] || 'status-idle';
        }
        
        // ========== 标签页切换 ==========
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                
                // 更新按钮状态
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // 切换标签页
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.getElementById('tab-' + tabId).classList.add('active');
                
                // 按需加载数据
                if (tabId === 'chat-history') {
                    ChatHistory.load();
                } else if (tabId === 'charts') {
                    Charts.refresh();
                } else if (tabId === 'monitoring') {
                    loadMonitoring();
                }
            });
        });
        
        // ========== 加载 Agents ==========
        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                const result = await response.json();
                
                if (result.success) {
                    state.agents = result.data;
                    renderAgents(result.data);
                }
            } catch (error) {
                console.error('Failed to load agents:', error);
                document.getElementById('agents-container').innerHTML = 
                    '<div class="error-state">加载失败，请刷新重试</div>';
            }
        }
        
        // ========== 渲染 Agents ==========
        function renderAgents(agents) {
            const container = document.getElementById('agents-container');
            container.innerHTML = '';
            
            Object.entries(agents).forEach(([id, agent]) => {
                const card = document.createElement('div');
                card.className = 'agent-card glass-card';
                card.onclick = () => window.location.href = `/agent_detail?id=${id}`;
                
                // 计算状态
                const statusClass = getStatusClass(agent.status);
                const statusText = getStatusText(agent.status);
                
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-avatar">${agent.emoji || '🤖'}</div>
                        <div class="agent-info">
                            <h3 class="agent-name">
                                ${agent.name}
                                <span>(${agent.english_name || id})</span>
                            </h3>
                            <span class="agent-role">${agent.role || '-'}</span>
                        </div>
                        <div class="status-badge ${statusClass}">
                            <span class="status-dot"></span>
                            ${statusText}
                        </div>
                    </div>
                    <div class="agent-details">
                        <div class="detail-row">
                            <span class="detail-label">模型</span>
                            <span class="detail-value">${agent.model || '-'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">当前任务</span>
                            <span class="detail-value">${agent.current_task || '无'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">已完成</span>
                            <span class="detail-value">${agent.tasks_completed || 0} 个任务</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">最后活跃</span>
                            <span class="detail-value">${formatRelativeTime(agent.last_active)}</span>
                        </div>
                    </div>
                    ${agent.skills && agent.skills.length > 0 ? `
                        <div class="skills-list">
                            ${agent.skills.slice(0, 4).map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                            ${agent.skills.length > 4 ? `<span class="skill-tag">+${agent.skills.length - 4}</span>` : ''}
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }
        
        // ========== 加载统计数据 ==========
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('online-agents').textContent = 
                        `${data.agents_online}/${data.agents_total}`;
                    document.getElementById('today-tasks').textContent = data.today_tasks || 0;
                    document.getElementById('today-messages').textContent = data.today_messages || 0;
                    document.getElementById('system-status').textContent = data.uptime || '-';
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }
        
        // ========== 加载日志 ==========
        async function loadLogs() {
            try {
                const response = await fetch('/api/logs?per_page=20');
                const result = await response.json();
                
                if (result.success) {
                    state.logs = result.data;
                    renderLogs(result.data);
                }
            } catch (error) {
                console.error('Failed to load logs:', error);
                document.getElementById('log-list').innerHTML = 
                    '<div class="error-state">加载失败</div>';
            }
        }
        
        // ========== 渲染日志 ==========
        function renderLogs(logs) {
            const container = document.getElementById('log-list');
            
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无日志记录</div>';
                return;
            }
            
            container.innerHTML = logs.map(log => `
                <div class="log-item">
                    <span class="log-time">${formatTime(log.timestamp)}</span>
                    <span class="log-agent ${log.agent_id}">${log.agent_name}</span>
                    <span class="log-action">${log.action}${log.details ? `: ${log.details}` : ''}</span>
                </div>
            `).join('');
        }
        
        // ========== 加载监控数据 ==========
        async function loadMonitoring() {
            try {
                const [healthRes, resourcesRes, dbRes, gatewayRes] = await Promise.all([
                    fetch('/api/monitoring/health'),
                    fetch('/api/monitoring/resources'),
                    fetch('/api/monitoring/database'),
                    fetch('/api/monitoring/gateway')
                ]);
                
                const health = await healthRes.json();
                const resources = await resourcesRes.json();
                const db = await dbRes.json();
                const gateway = await gatewayRes.json();
                
                renderMonitoring(health.data, resources.data, db.data, gateway.data);
            } catch (error) {
                console.error('Failed to load monitoring:', error);
            }
        }
        
        // ========== 渲染监控面板 ==========
        function renderMonitoring(health, resources, db, gateway) {
            const container = document.getElementById('monitoring-grid');
            
            // 健康状态
            const healthStatus = health?.status || 'unknown';
            const healthScore = health?.score || 0;
            const healthClass = healthScore >= 70 ? 'status-ok' : healthScore >= 40 ? 'status-warning' : 'status-error';
            
            container.innerHTML = `
                <!-- 健康状态 -->
                <div class="monitor-card ${healthClass}">
                    <h3>系统健康</h3>
                    <div style="text-align: center; padding: 20px 0;">
                        <div style="font-size: 48px; font-weight: 700; color: ${healthScore >= 70 ? 'var(--status-online)' : healthScore >= 40 ? 'var(--status-busy)' : 'var(--status-offline)'}">
                            ${healthScore}
                        </div>
                        <div style="font-size: 14px; color: var(--text-muted);">健康分数</div>
                    </div>
                </div>
                
                <!-- 数据库状态 -->
                <div class="monitor-card ${db?.status === 'connected' ? 'status-ok' : 'status-error'}">
                    <h3>数据库</h3>
                    <div class="status-row">
                        <span class="label">状态</span>
                        <span class="value ${db?.status === 'connected' ? 'status-ok' : 'status-error'}">
                            ${db?.status === 'connected' ? '已连接' : '断开'}
                        </span>
                    </div>
                    <div class="status-row">
                        <span class="label">类型</span>
                        <span class="value">${db?.type || '-'}</span>
                    </div>
                    <div class="status-row">
                        <span class="label">大小</span>
                        <span class="value">${db?.size_human || '-'}</span>
                    </div>
                    <div class="status-row">
                        <span class="label">延迟</span>
                        <span class="value">${db?.latency_ms ? db.latency_ms + 'ms' : '-'}</span>
                    </div>
                </div>
                
                <!-- 网关状态 -->
                <div class="monitor-card ${gateway?.status === 'connected' ? 'status-ok' : 'status-error'}">
                    <h3>OpenClaw 网关</h3>
                    <div class="status-row">
                        <span class="label">状态</span>
                        <span class="value ${gateway?.status === 'connected' ? 'status-ok' : 'status-error'}">
                            ${gateway?.status === 'connected' ? '已连接' : '断开'}
                        </span>
                    </div>
                    <div class="status-row">
                        <span class="label">地址</span>
                        <span class="value">${gateway?.url || '-'}</span>
                    </div>
                    <div class="status-row">
                        <span class="label">版本</span>
                        <span class="value">${gateway?.version || '-'}</span>
                    </div>
                    <div class="status-row">
                        <span class="label">运行时间</span>
                        <span class="value">${gateway?.uptime || '-'}</span>
                    </div>
                </div>
                
                <!-- 系统资源 -->
                <div class="monitor-card">
                    <h3>系统资源</h3>
                    <div class="status-row">
                        <span class="label">CPU</span>
                        <span class="value">${resources?.cpu?.percent?.toFixed(1) || '-'}%</span>
                    </div>
                    <div class="status-row">
                        <span class="label">内存</span>
                        <span class="value">${resources?.memory?.percent?.toFixed(1) || '-'}%</span>
                    </div>
                    <div class="status-row">
                        <span class="label">磁盘</span>
                        <span class="value">${resources?.disk?.percent?.toFixed(1) || '-'}%</span>
                    </div>
                    <div class="status-row">
                        <span class="label">进程内存</span>
                        <span class="value">${resources?.process?.memory_mb?.toFixed(1) || '-'} MB</span>
                    </div>
                </div>
            `;
        }
        
        // ========== SSE 实时连接 ==========
        function connectSSE() {
            if (state.sse) {
                state.sse.close();
            }
            
            state.sse = new EventSource('/api/stream');
            
            state.sse.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'heartbeat') {
                        // 更新 Agents
                        if (data.agents) {
                            state.agents = data.agents;
                            renderAgents(data.agents);
                        }
                        
                        // 更新连接状态
                        updateConnectionStatus(true);
                    }
                } catch (e) {
                    console.error('SSE parse error:', e);
                }
            };
            
            state.sse.onerror = () => {
                updateConnectionStatus(false);
                // 5秒后重连
                setTimeout(() => {
                    if (state.sse && state.sse.readyState === EventSource.CLOSED) {
                        connectSSE();
                    }
                }, 5000);
            };
            
            state.sse.onopen = () => {
                updateConnectionStatus(true);
            };
        }
        
        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('conn-indicator');
            const text = document.getElementById('conn-text');
            
            if (connected) {
                indicator.classList.remove('disconnected');
                text.textContent = '实时连接中';
            } else {
                indicator.classList.add('disconnected');
                text.textContent = '连接断开';
            }
        }
        
        // ========== 对话历史模块 ==========
        const ChatHistory = {
            page: 1,
            filter: 'all',
            
            setFilter(agent) {
                this.filter = agent;
                this.page = 1;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.agent === agent);
                });
                this.load();
            },
            
            async load() {
                const loading = document.getElementById('chat-loading');
                const container = document.getElementById('chat-messages');
                
                loading.style.display = 'flex';
                
                try {
                    let url = `/api/chat-history?page=${this.page}&per_page=20`;
                    
                    const response = await fetch(url);
                    const result = await response.json();
                    
                    if (result.success) {
                        this.render(result.data, result.total, result.pages);
                    }
                } catch (error) {
                    console.error('Failed to load chat history:', error);
                    container.innerHTML = '<div class="error-state">加载失败</div>';
                } finally {
                    loading.style.display = 'none';
                }
            },
            
            render(messages, total, pages) {
                const container = document.getElementById('chat-messages');
                const info = document.getElementById('pagination-info');
                
                if (!messages || messages.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无对话记录</div>';
                    info.textContent = '';
                    return;
                }
                
                // 过滤
                let filtered = messages;
                if (this.filter !== 'all') {
                    filtered = messages.filter(m => m.agent_mentioned === this.filter);
                }
                
                container.innerHTML = filtered.map(msg => `
                    <div class="chat-message">
                        <div class="message-avatar">${this.getAvatar(msg.sender)}</div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-sender">${msg.sender}</span>
                                <span class="message-time">${formatTime(msg.timestamp)}</span>
                            </div>
                            <div class="message-text">${this.escapeHtml(msg.content)}</div>
                        </div>
                    </div>
                `).join('');
                
                info.textContent = `第 ${this.page} 页，共 ${pages} 页，${total} 条记录`;
            },
            
            getAvatar(sender) {
                const avatars = {
                    'xilian': '🌀',
                    'tangyuan': '🐱',
                    'doufu': '🟦',
                    'user': '👤'
                };
                return avatars[sender.toLowerCase()] || '💬';
            },
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },
            
            loadMore() {
                this.page++;
                this.load();
            },
            
            connectSSE() {
                // 预留实时更新
            }
        };
        
        // ========== 图表模块 ==========
        const Charts = {
            timeRange: '24h',
            
            setTimeRange(range) {
                this.timeRange = range;
                document.querySelectorAll('.time-range-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.range === range);
                });
                this.refresh();
            },
            
            async refresh() {
                try {
                    const response = await fetch('/api/stats/response-time');
                    const result = await response.json();
                    
                    if (result.success) {
                        this.renderResponseTimeChart(result.data);
                    }
                    
                    // 获取任务统计
                    const statsRes = await fetch('/api/stats');
                    const stats = await statsRes.json();
                    if (stats.success) {
                        this.renderTaskChart(stats.data);
                    }
                } catch (error) {
                    console.error('Failed to load charts:', error);
                }
            },
            
            renderResponseTimeChart(data) {
                const ctx = document.getElementById('response-time-chart');
                if (!ctx) return;
                
                if (state.charts.responseTime) {
                    state.charts.responseTime.destroy();
                }
                
                state.charts.responseTime = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels || [],
                        datasets: [
                            {
                                label: '昔涟',
                                data: data.xilian || [],
                                borderColor: '#8B5CF6',
                                backgroundColor: 'rgba(139, 92, 246, 0.1)',
                                tension: 0.4,
                                fill: true
                            },
                            {
                                label: '汤圆',
                                data: data.tangyuan || [],
                                borderColor: '#F59E0B',
                                backgroundColor: 'rgba(245, 158, 11, 0.1)',
                                tension: 0.4,
                                fill: true
                            },
                            {
                                label: '豆腐',
                                data: data.doufu || [],
                                borderColor: '#22C55E',
                                backgroundColor: 'rgba(34, 197, 94, 0.1)',
                                tension: 0.4,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#CBD5E1' }
                            }
                        },
                        scales: {
                            x: {
                                ticks: { color: '#94A3B8' },
                                grid: { color: 'rgba(148, 163, 184, 0.1)' }
                            },
                            y: {
                                ticks: { color: '#94A3B8' },
                                grid: { color: 'rgba(148, 163, 184, 0.1)' }
                            }
                        }
                    }
                });
            },
            
            renderTaskChart(data) {
                const ctx = document.getElementById('task-completion-chart');
                if (!ctx) return;
                
                if (state.charts.taskCompletion) {
                    state.charts.taskCompletion.destroy();
                }
                
                state.charts.taskCompletion = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['昔涟', '汤圆', '豆腐'],
                        datasets: [{
                            data: [
                                state.agents.xilian?.tasks_completed || 0,
                                state.agents.tangyuan?.tasks_completed || 0,
                                state.agents.doufu?.tasks_completed || 0
                            ],
                            backgroundColor: [
                                '#8B5CF6',
                                '#F59E0B',
                                '#22C55E'
                            ],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: '#CBD5E1' }
                            }
                        }
                    }
                });
            },
            
            exportReport(format) {
                window.location.href = `/api/stats/export?format=${format}`;
            }
        };
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
            loadStats();
            loadLogs();
            connectSSE();
            
            // 定时刷新
            setInterval(loadStats, 30000);
            setInterval(loadLogs, 60000);
        });
    </script>
</body>
</html>
